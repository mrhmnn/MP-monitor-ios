name: Marktplaats iPhone Scan

# Runs automatically every 30 minutes, and can also be triggered manually
# from the Actions tab (useful for testing without waiting for the schedule).
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes, in UTC time
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so this workflow can save the updated database back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # IMPORTANT: GitHub Actions gives you a brand new, empty machine every
      # single run - nothing persists automatically. Without this step,
      # seen_listings.db (and the geocode cache inside it) would reset to
      # empty every 30 minutes, and you'd get re-notified about the same
      # listings forever. This step saves the updated database file back
      # into the repository so the next run picks up where this one left off.
      - name: Save updated database back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_listings.db
          git diff --staged --quiet || git commit -m "Update seen listings database"
          git push
