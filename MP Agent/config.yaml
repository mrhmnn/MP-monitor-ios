# Marktplaats iPhone Monitor - Configuration
# Secrets (API keys, tokens) go in .env, NOT here. This file is safe to commit to git.

# --- Search setup ---
# Marktplaats' search returns 30 listings per query, sorted newest-first.
# We use a mix of:
#   - Broad damage-term queries (catch matches across all model generations)
#   - Model-specific queries (catch fresh listings that would otherwise get
#     pushed off the newest-30 list by higher-volume broad-term results)
# The Python filter then decides which model + damage combo actually qualifies.
search_queries:
  # Broad damage-phrase queries
  - "iphone scherm kapot"
  - "iphone scherm gebarsten"
  - "iphone scherm defect"
  - "iphone scherm beschadigd"
  - "iphone achterkant kapot"
  - "iphone achterkant gebarsten"
  - "iphone achterkant beschadigd"
  - "iphone laadt niet op"
  - "iphone oplaadprobleem"
  - "iphone mankement"
  - "iphone groene streep scherm"
  - "iphone voor onderdelen"
  - "iphone voor reparatie"
  - "iphone camera glaasje kapot"
  # Model-specific queries - one per generation to catch fresh listings
  # that broad queries might miss due to Marktplaats' relevance ranking
  - "iphone 14 defect"
  - "iphone 15 defect"
  - "iphone 16 defect"
  - "iphone 17 defect"
  - "iphone 14 kapot"
  - "iphone 15 kapot"
  - "iphone 16 kapot"
  - "iphone 17 kapot"

base_search_url: "https://www.marktplaats.nl/l/telecommunicatie/mobiele-telefoons-apple-iphone/q/{query}/#Sort:SortIndex|dateDesc"

# --- Model filter (checked against TITLE only) ---
# Substring matching against the listing title. Since "iphone 14" is a
# substring of "iphone 14 pro" and "iphone 14 pro max" and "iphone 14 plus",
# a single base-model entry catches all variants of that generation - no
# need to enumerate all four variants explicitly. Covers 14, 15, 16, 17
# and all their Pro/Plus/Pro Max variants. iPhone Air is explicitly
# excluded via title_model_excludes below.
target_models:
  - "iphone 14"
  - "iphone14"
  - "iphone 15"
  - "iphone15"
  - "iphone 16"
  - "iphone16"
  - "iphone 17"
  - "iphone17"

# --- Model exclusions (checked against TITLE only) ---
# Even if a listing matches a target_models entry, if its title also
# contains one of these, it's rejected. Used to exclude iPhone Air, since
# "iphone 17" would substring-match against a hypothetical "iPhone 17 Air"
# listing otherwise.
title_model_excludes:
  - "iphone air"
  - "iphoneair"

# --- Primary damage keywords (auto-match if present, unless excluded below) ---
# These represent "cheap, quick fix" damage - the profitable target range.
# Deep/expensive damage (won't power on, motherboard, water damage) is
# handled by hard_excludes further down.
primary_keywords:
  # Screen damage
  - "scherm gebarsten"
  - "scherm kapot"
  - "scherm defect"
  - "scherm beschadigd"
  - "gebarsten scherm"
  - "kapot scherm"
  - "beschadigd scherm"
  - "scherm doet het niet"
  - "scherm werkt niet"
  - "groene streep"
  # Back cover damage
  - "achterkant kapot"
  - "achterkant gebarsten"
  - "achterkant beschadigd"
  - "achterkant los"
  - "achterglas kapot"
  - "achterglas beschadigd"
  - "backcover kapot"
  # Charging problems
  - "laadt niet op"
  - "laad niet op"
  - "oplaadprobleem"
  - "laadprobleem"
  - "gaat niet opladen"
  # Camera lens glass (typically a cheap glue-on fix, fits the profit model
  # per Phase 1 discussion - not the same as full camera module failure)
  - "camera glaasje kapot"
  - "camera glaasje gebarsten"
  - "camera glas kapot"
  - "camera glas gebarsten"
  - "camera lens kapot"
  # Self-flagged "for parts/repair" listings - strongest signal that the
  # seller acknowledges damage and expects a low price
  - "voor onderdelen"
  - "voor reparatie"
  - "voor iemand die handig is"
  - "geschikt voor onderdelen"

# --- Hard excludes: if ANY of these appear, the listing is skipped no matter what ---
# Deep/expensive damage or blocking issues that don't fit the profit model.
hard_excludes:
  - "icloud lock"
  - "icloud-lock"
  - "icloud-vergrendeling"
  - "icloud vergrendeling"
  - "icloud geblokkeerd"
  - "activatieslot"
  - "activatie slot"
  - "waterschade"
  - "gaat niet meer aan"
  - "gaat niet aan"
  # Counterfeit/replica phones - found in production: "voor onderdelen"
  # matched a "Namaak iPhone" (fake iPhone) listing, since that keyword
  # doesn't check whether the phone is even genuine.
  - "namaak"
  - "replica"
  - "nep iphone"
  - "neptelefoon"
  # Deep/expensive internal damage - found in production: "voor onderdelen"
  # matched a listing explicitly describing motherboard damage, which is
  # exactly the deep-damage category outside the cheap-fix profit model.
  - "moederbord"
  - "logic board"
  - "logicboard"

# --- Ambiguous terms that route to AI review ---
# When one of these appears WITHOUT a matching negation phrase nearby,
# the listing gets sent to Claude Haiku for a relevance judgment. The AI
# decides if the described defect is plausibly a cheap screen/back/charging
# repair vs something outside the profit model. Only called for listings
# that don't already match a primary keyword - saves API cost.
ambiguous_terms:
  - "mankement"
  - "mankementen"
  - "gebrek"
  - "gebreken"
  - "problemen"
  - "problemem"   # common typo variant seen on Marktplaats
  - "iets kleins"
  - "lichte schade"
  - "kleine schade"

# --- Negation phrases: if any appear, skip AI review entirely (free filter) ---
# Prevents wasting API calls on listings where the seller is actively
# saying there's NO defect ("geen mankementen"). This is the cheap
# pre-filter that stops "no defect" listings from ever reaching the AI.
negation_phrases:
  - "geen mankement"
  - "geen mankementen"
  - "geen enkele mankement"
  - "zonder mankement"
  - "vrij van mankement"
  - "geen gebreken"
  - "geen enkel gebrek"
  - "zonder gebreken"
  - "geen problemen"
  - "geen enkel probleem"
  - "zonder problemen"
  - "geen schade"

# --- Noise filters: business/shop listings and "wanted to buy" ads ---
business_seller_indicators:
  - "meerdere op voorraad"
  - "1 jaar garantie"
  - "wij kopen"
  - "onze website"
  - "afhalen op afspraak"
  - "webshop"
  - "gecontroleerde verkoper"
business_indicator_threshold: 2

buyer_ad_indicators:
  - "gevraagd,"
  - "ik ben op zoek naar"
  - "ik zoek"
  - "gezocht:"
  - "op zoek naar kapotte"
  - "op zoek naar defecte"

# --- Vague title signals ---
# If the TITLE contains one of these, the seller is explicitly saying
# "don't judge this from the title, read the description" - found in
# production: "iPhone 14 Pro - Lees beschrijving!" auto-matched a primary
# keyword from its description text without any real scrutiny. Listings
# with these phrases get routed to AI confirmation even if a primary
# keyword already matched, rather than being auto-accepted.
vague_title_signals:
  - "lees beschrijving"
  - "zie beschrijving"
  - "lees de beschrijving"
  - "beschrijving lezen"
  - "lees eerst de beschrijving"

# --- Location (for distance calculation) ---
home_location: "Veenendaal, Netherlands"
home_lat: 52.0227
home_lon: 5.5546

# --- AI classifier ---
ai_model: "claude-haiku-4-5-20251001"

# --- Scheduling / behavior ---
request_delay_seconds: 2

# --- Health monitoring ---
# If total_fetched across ALL queries in a single run falls below this,
# something is probably broken (Marktplaats changed their page structure,
# started blocking the scraper, etc.) rather than there genuinely being
# fewer listings today. A Telegram alert gets sent so this surfaces
# immediately instead of silently degrading matches for days, the way the
# original scraper bug did before anyone noticed.
alert_min_total_fetched: 30
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
