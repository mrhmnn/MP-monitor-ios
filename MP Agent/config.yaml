# Marktplaats iPhone Monitor - Configuration
# Secrets (API keys, tokens) go in .env, NOT here. This file is safe to commit to git.

# --- Search setup ---
# Each query pulls the newest ~30 listings via Marktplaats' internal LRP
# search API (true date-desc sorting - the old HTML page was relevance-
# sorted despite the #Sort fragment, which browsers never send to the
# server). We use a mix of:
#   - Broad damage-term queries (catch matches across all model generations)
#   - Model-specific queries (catch fresh listings that would otherwise get
#     pushed off the newest-30 list by higher-volume broad-term results)
# The Python filter then decides which model + damage combo actually qualifies.
search_queries:
  # Broad damage-phrase queries
  - "iphone scherm kapot"
  - "iphone scherm gebarsten"
  - "iphone scherm defect"
  - "iphone scherm beschadigd"
  - "iphone achterkant kapot"
  - "iphone achterkant gebarsten"
  - "iphone achterkant beschadigd"
  - "iphone laadt niet op"
  - "iphone oplaadprobleem"
  - "iphone mankement"
  - "iphone groene streep scherm"
  - "iphone voor onderdelen"
  - "iphone voor reparatie"
  - "iphone camera glaasje kapot"
  # Model-specific queries - one per generation to catch fresh listings
  # that broad queries might miss due to Marktplaats' relevance ranking
  - "iphone 14 defect"
  - "iphone 15 defect"
  - "iphone 16 defect"
  - "iphone 17 defect"
  - "iphone 14 kapot"
  - "iphone 15 kapot"
  - "iphone 16 kapot"
  - "iphone 17 kapot"
  # Added — broader damage phrasing not covered by the queries above
  - "iphone display kapot"
  - "iphone touchscreen kapot"
  - "iphone valschade"
  - "iphone gebutst"
  # Added 2026-07-10 — "schade" is the single most common Dutch damage word
  # and had NO query at all. Found in production: "Apple iPhone 15 128GB
  # Groen *Schade*" (m2419022529) was invisible to every query above -
  # verified live that only "schade" queries surface it. Broad + per-model,
  # same pattern as kapot/defect.
  - "iphone schade"
  - "iphone 14 schade"
  - "iphone 15 schade"
  - "iphone 16 schade"
  - "iphone 17 schade"
  # Common seller typo of "beschadigd" - Marktplaats search does no
  # stemming, so "iphone beschadigd"-style queries never match it (the
  # m2419022529 listing wrote "Achterkant is beschadigt", verified live).
  - "iphone beschadigt"
  # Added 2026-07-12 - bare "barst"/"gebarsten" had no query: only the
  # phrase forms ("scherm gebarsten", "achterkant gebarsten") existed, so
  # titles like "iPhone 15 met barst" were never fetched (found manually).
  # No stemming on Marktplaats, so both word forms need their own query.
  - "iphone barst"
  - "iphone gebarsten"
  - "iphone 14 barst"
  - "iphone 15 barst"
  - "iphone 16 barst"
  - "iphone 17 barst"
  # Added 2026-07-14 - won't-power-on listings are in scope again (decision:
  # often a dead battery/screen, not a board). Without a query they'd never
  # be fetched at all - the same fetch-gap class as the "schade"/"barst"
  # misses. One broad query: Marktplaats matches on words, so this also
  # surfaces "gaat niet meer aan" phrasings.
  - "iphone gaat niet aan"

# HTML search page - FALLBACK ONLY, used when the LRP API call fails.
# Note: the #Sort fragment is client-side only, so this fallback returns
# relevance-sorted results, not newest-first. Better than nothing.
base_search_url: "https://www.marktplaats.nl/l/telecommunicatie/mobiele-telefoons-apple-iphone/q/{query}/#Sort:SortIndex|dateDesc"

# --- Model filter (checked against TITLE only) ---
# Substring matching against the listing title. Since "iphone 14" is a
# substring of "iphone 14 pro" and "iphone 14 pro max" and "iphone 14 plus",
# a single base-model entry catches all variants of that generation - no
# need to enumerate all four variants explicitly. Covers 14, 15, 16, 17
# and all their Pro/Plus/Pro Max variants.
# "iph" entries cover the common Marktplaats abbreviation (e.g. "IPH 14
# Pro Max scherm kapot") - sellers use this constantly and it was missing
# entirely before, silently dropping every "iph"-titled listing.
target_models:
  - "iphone 14"
  - "iphone14"
  - "iphone 15"
  - "iphone15"
  - "iphone 16"
  - "iphone16"
  - "iphone 17"
  - "iphone17"
  - "iph 14"
  - "iph14"
  - "iph 15"
  - "iph15"
  - "iph 16"
  - "iph16"
  - "iph 17"
  - "iph17"

# --- Primary damage keywords (auto-match if present, unless excluded below) ---
# These represent "cheap, quick fix" damage - the profitable target range.
# Deep/expensive damage (won't power on, motherboard, water damage) is
# handled by hard_excludes further down.
primary_keywords:
  # Screen damage
  - "scherm gebarsten"
  - "scherm kapot"
  - "scherm defect"
  - "scherm beschadigd"
  - "gebarsten scherm"
  - "kapot scherm"
  - "beschadigd scherm"
  - "scherm doet het niet"
  - "scherm werkt niet"
  - "groene streep"
  # Added — screen damage phrasing variants
  - "display kapot"
  - "display defect"
  - "touchscreen kapot"
  - "touchscreen defect"
  - "scherm barst"
  - "scherm gebroken"
  # Back cover damage
  - "achterkant kapot"
  - "achterkant gebarsten"
  - "achterkant beschadigd"
  - "achterkant los"
  - "achterglas kapot"
  - "achterglas beschadigd"
  - "backcover kapot"
  # Added — back cover phrasing variants
  - "achterkant gebroken"
  - "glas achterkant kapot"
  - "deksel kapot"
  # Charging problems
  - "laadt niet op"
  - "laad niet op"
  - "oplaadprobleem"
  - "laadprobleem"
  - "gaat niet opladen"
  # Added — charging phrasing variants
  - "batterij defect"
  - "laadpoort kapot"
  - "lightning poort defect"
  # Camera lens glass (typically a cheap glue-on fix, fits the profit model
  # per Phase 1 discussion - not the same as full camera module failure)
  - "camera glaasje kapot"
  - "camera glaasje gebarsten"
  - "camera glas kapot"
  - "camera glas gebarsten"
  - "camera lens kapot"
  # Self-flagged "for parts/repair" listings - strongest signal that the
  # seller acknowledges damage and expects a low price
  - "voor onderdelen"
  - "voor reparatie"
  - "voor iemand die handig is"
  - "geschikt voor onderdelen"

# --- Hard excludes: if ANY of these appear, the listing is skipped no matter what ---
# Deep/expensive damage or blocking issues that don't fit the profit model.
hard_excludes:
  - "icloud lock"
  - "icloud-lock"
  - "icloud-vergrendeling"
  - "icloud vergrendeling"
  - "icloud geblokkeerd"
  - "activatieslot"
  - "activatie slot"
  - "waterschade"
  # Counterfeit/replica phones - found in production: "voor onderdelen"
  # matched a "Namaak iPhone" (fake iPhone) listing, since that keyword
  # doesn't check whether the phone is even genuine.
  - "namaak"
  - "replica"
  - "nep iphone"
  - "neptelefoon"
  # Deep/expensive internal damage - found in production: "voor onderdelen"
  # matched a listing explicitly describing motherboard damage, which is
  # exactly the deep-damage category outside the cheap-fix profit model.
  - "moederbord"
  - "logic board"
  - "logicboard"

# --- Ambiguous terms that route to AI review ---
# When one of these appears WITHOUT a matching negation phrase nearby,
# the listing gets sent to Claude Haiku for a relevance judgment. The AI
# decides if the described defect is plausibly a cheap screen/back/charging
# repair vs something outside the profit model. Only called for listings
# that don't already match a primary keyword - saves API cost.
ambiguous_terms:
  - "mankement"
  - "mankementen"
  - "gebrek"
  - "gebreken"
  - "problemen"
  - "problemem"   # common typo variant seen on Marktplaats
  - "iets kleins"
  - "lichte schade"
  - "kleine schade"
  # Added — broader damage signals that deserve an AI judgment call
  # rather than an outright miss or an unchecked auto-match
  - "valschade"
  - "gevallen"
  - "gebutst"
  - "deuk"
  - "beschadigd"   # bare, unqualified — could be screen/back/case/cosmetic-only
  - "beschadigt"   # common typo of "beschadigd" seen in production (m2419022529)
  - "schade"       # bare, unqualified — subsumes lichte/kleine/val-schade above;
                   # "geen schade" negation still short-circuits it for free
  - "barst"        # bare, unqualified — substring also covers "gebarsten",
                   # "barstje", "barsten"; phrase forms ("scherm barst") still
                   # auto-match as primary keywords first
  # Won't-power-on un-excluded per Milad's decision 2026-07-13 ("gaat niet
  # aan" already un-excluded 2026-07-12): often just a dead battery or
  # screen, not a board. AI judges each case; water/board mentions still
  # hard-exclude above.
  - "gaat niet aan"
  - "gaat niet meer aan"
  - "doet het niet meer"
  - "start niet"

# --- Negation phrases: if any appear, skip AI review entirely (free filter) ---
# Prevents wasting API calls on listings where the seller is actively
# saying there's NO defect ("geen mankementen"). This is the cheap
# pre-filter that stops "no defect" listings from ever reaching the AI.
negation_phrases:
  - "geen mankement"
  - "geen mankementen"
  - "geen enkele mankement"
  - "zonder mankement"
  - "vrij van mankement"
  - "geen gebreken"
  - "geen enkel gebrek"
  - "zonder gebreken"
  - "geen problemen"
  - "geen enkel probleem"
  - "zonder problemen"
  - "geen schade"
  - "geen barst"    # substring also covers "geen barsten"/"geen barstjes"
  - "zonder barst"
  - "barstvrij"

# --- Noise filters: business/shop listings and "wanted to buy" ads ---
business_seller_indicators:
  - "meerdere op voorraad"
  - "1 jaar garantie"
  - "wij kopen"
  - "onze website"
  - "afhalen op afspraak"
  - "webshop"
  - "gecontroleerde verkoper"
business_indicator_threshold: 2

buyer_ad_indicators:
  - "gevraagd,"
  - "ik ben op zoek naar"
  - "ik zoek"
  - "gezocht:"
  - "op zoek naar kapotte"
  - "op zoek naar defecte"

# --- Vague title signals ---
# If the TITLE contains one of these, the seller is explicitly saying
# "don't judge this from the title, read the description" - found in
# production: "iPhone 14 Pro - Lees beschrijving!" auto-matched a primary
# keyword from its description text without any real scrutiny. Listings
# with these phrases get routed to AI confirmation even if a primary
# keyword already matched, rather than being auto-accepted.
vague_title_signals:
  - "lees beschrijving"
  - "zie beschrijving"
  - "lees de beschrijving"
  - "beschrijving lezen"
  - "lees eerst de beschrijving"

# --- Location (for distance calculation) ---
home_location: "Veenendaal, Netherlands"
home_lat: 52.0227
home_lon: 5.5546

# Hard cutoff: matches with a KNOWN driving distance beyond this many km
# are skipped entirely (not worth the trip). Matches whose distance
# couldn't be determined are still sent - better to eyeball a city name
# manually than to silently drop a potentially close listing.
max_distance_km: 200

# --- Structured business-seller rejection (from Marktplaats' own listing data) ---
# seller_with_website: the seller has a business website linked on the
# listing - that's a shop by definition.
# priority_listings: DAGTOPPER/TOPADVERTENTIE paid placements - verified
# live that repair shops use these constantly, private sellers of a single
# broken phone essentially never.
reject_seller_with_website: true
reject_priority_listings: true

# --- Market-price tracking (market.py) ---
# Realistic per-model pricing built from what listings ACTUALLY go for:
# bids (scraped per listing page) and listings that disappear within days
# with bids on them (= sale proxy; Marktplaats publishes no sold prices).
# Resale-side sweep: broad per-generation queries whose newest-30 results
# feed ONLY the price tracker (working phones = flip exit prices). They
# never generate alerts. ~4 extra API calls per scan, no detail pages.
market_queries:
  - "iphone 14"
  - "iphone 15"
  - "iphone 16"
  - "iphone 17"
# Detail-page fetches are the expensive part, so both are capped per run
# (runs every 30 min, so even 10-20 per run covers hundreds per day).
market_bid_poll_per_run: 20        # bid readings for open bieden-listings
market_closure_checks_per_run: 10  # sold/removed checks for stale listings
# A tracked listing unseen for this many hours gets one detail-page check:
# gone -> closed (bids + gone fast = likely sold), live -> requeued.
market_stale_hours: 48
# [MARKT] alert line: only shown once the damaged-segment sample size for
# that model reaches this - keeps alerts noise-free while data accumulates.
market_bench_min_n: 5
market_bench_window_days: 30

# --- AI classifier ---
ai_model: "claude-haiku-4-5-20251001"

# Send target-model listings that matched NO damage keyword at all to the
# AI as well (instead of silently rejecting them). Catches damage phrasings
# the keyword lists don't cover ("iPhone 14 kapot", "glas stuk zie fotos").
# Negation-guarded, only runs for genuinely new listings, Haiku-priced -
# a handful of calls per scan. Set false to rein in API usage.
ai_review_unmatched: true

# --- Scheduling / behavior ---
request_delay_seconds: 2

# --- Reappeared listings ---
# Each scan only pulls the newest-30 results per query, so a previously-seen
# listing that drops out of view has been sold/removed/pushed off the list.
# If it later resurfaces after sitting untouched for at least this many
# hours, it's treated as a relist/bump and re-notified (only if it matched
# our filters the first time around) rather than silently skipped forever.
reappear_gap_hours: 24

# --- Health monitoring ---
# If total_fetched across ALL queries in a single run falls below this,
# something is probably broken (Marktplaats changed their page structure,
# started blocking the scraper, etc.) rather than there genuinely being
# fewer listings today. A Telegram alert gets sent so this surfaces
# immediately instead of silently degrading matches for days, the way the
# original scraper bug did before anyone noticed.
alert_min_total_fetched: 30
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
