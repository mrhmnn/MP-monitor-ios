name: Tests

# Fast unit tests over the filter/parsing logic - the code where every
# historical missed-listing bug has lived. No network, no secrets.
on:
  push:
    branches: [main]
    paths:
      - "MP Agent/**"
      - ".github/workflows/test.yml"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "MP Agent"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "MP Agent/requirements.txt"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -q
