name: Weekly Market Price Summary

# Posts the per-model price benchmark (pricebench.py --summary) to Telegram
# every Saturday just before the 16:30 weekly review. Read-only: restores
# the database from the data branch but never writes back - the 30-min scan
# workflow owns all state changes.
on:
  schedule:
    - cron: "0 14 * * 6"   # Sat 14:00 UTC = 16:00 NL (summer)
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "MP Agent"

    steps:
      - name: Check out repository (main branch, for code)
        uses: actions/checkout@v4

      - name: Restore database from data branch
        working-directory: ${{ github.workspace }}
        run: |
          if git ls-remote --exit-code --heads origin data; then
            git fetch origin data
            git checkout origin/data -- "MP Agent/seen_listings.db" 2>/dev/null || echo "No database on data branch yet"
          else
            echo "data branch does not exist yet - nothing to report"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "MP Agent/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send price summary to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pricebench.py --summary --telegram
