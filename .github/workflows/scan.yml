name: Marktplaats iPhone Scan

# Runs automatically every 30 minutes, and can also be triggered manually
# from the Actions tab (useful for testing without waiting for the schedule).
on:
  schedule:
    # TEMPORARY - every minute, purely to diagnose whether scheduled
    # triggers fire at all on this repo. Will be reverted to "7,37 * * * *"
    # once confirmed working.
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so this workflow can save the updated database back to the repo

    # All the actual project files live inside the "MP Agent" subfolder in
    # this repo, not at the root - this tells every step below to run from
    # inside that folder instead of the repo root.
    defaults:
      run:
        working-directory: "MP Agent"

    steps:
      - name: Check out repository (main branch, for code)
        uses: actions/checkout@v4

      # The database is stored on a separate `data` branch to keep main's
      # commit history clean (main = code only, data = state snapshots).
      # This step downloads the latest database from that data branch
      # into the working directory before the scan runs.
      - name: Restore database from data branch
        working-directory: ${{ github.workspace }}
        run: |
          # Try to fetch the data branch. If it doesn't exist yet
          # (very first run), we start fresh with no database.
          if git ls-remote --exit-code --heads origin data; then
            git fetch origin data
            git checkout origin/data -- "MP Agent/seen_listings.db" 2>/dev/null || echo "No existing database on data branch, starting fresh"
          else
            echo "data branch does not exist yet, will be created after first scan"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # Save the updated database to the `data` branch (a separate branch
      # dedicated to state snapshots). Force-push the latest snapshot -
      # we don't care about history for this file, just the current state.
      # This keeps main's history clean (only code changes appear there).
      - name: Save updated database to data branch
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create an orphan data branch containing ONLY the database file.
          # Orphan = no shared history with main, keeps it separate and small.
          # We rebuild this branch from scratch each run - a single commit,
          # single file, no accumulating history.
          git checkout --orphan data-tmp
          git rm -rf --cached . > /dev/null
          # -f (force) is required here: the repo's .gitignore (still present
          # in the working directory even after --orphan) excludes this file
          # so it stays untracked on main - but on this dedicated data
          # branch we explicitly want to track it, so we override that.
          git add -f "MP Agent/seen_listings.db"
          git commit -m "Update seen listings database" || echo "No changes to commit"
          git push origin data-tmp:data --force
          echo "Database snapshot pushed to data branch"
