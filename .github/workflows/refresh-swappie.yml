name: Refresh Swappie Prices

# Refreshes data/swappie_prices.json ([SWAPPIE] resale benchmarks for the
# Phase 2 profit estimate) and commits it back to main so every scan uses
# reasonably fresh prices without hitting swappie.com during scans.
#
# Same scheduler caveat as scan.yml: GitHub's cron has never reliably
# fired for this repo, so the schedule below is a best-effort backup.
# For dependable weekly refreshes, point cron-job.org at this workflow's
# dispatch endpoint (once a week is plenty - refurb prices move slowly).
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC (backup - see note above)
  workflow_dispatch:

concurrency:
  group: refresh-swappie
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commits the refreshed price file back to main

    defaults:
      run:
        working-directory: "MP Agent"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "MP Agent/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh Swappie prices
        run: python refresh_swappie_prices.py

      - name: Commit updated prices (if changed)
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "MP Agent/data/swappie_prices.json"
          # Only commit when prices actually changed - keeps history clean
          # on weeks where Swappie didn't move anything.
          if git diff --cached --quiet; then
            echo "No price changes this week."
          else
            git commit -m "Data: weekly Swappie price refresh"
            git push
          fi
